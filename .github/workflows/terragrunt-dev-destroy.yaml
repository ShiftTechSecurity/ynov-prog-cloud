---
name: Terragrunt Destroy Dev

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type DESTROY to confirm Terragrunt destroy on Dev'
        required: true
        type: string

permissions:
  contents: read

env:
  TERRAGRUNT_CONFIG_DIRECTORY: terragrunt-tp1-jour3/dev
  AWS_REGION: eu-west-1

jobs:
  terragrunt-destroy:
    name: Terragrunt plan destroy and apply destroy
    runs-on: ubuntu-latest

    steps:
      - name: Validate destroy confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "You must type DESTROY to run this workflow."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terragrunt and OpenTofu
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: '0.82.2'
          tofu_version: '1.10.1'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt init
        run: terragrunt init -input=false
        working-directory: ${{ env.TERRAGRUNT_CONFIG_DIRECTORY }}

      - name: Terragrunt plan destroy
        run: terragrunt plan -destroy -input=false -no-color -out=tgplan-destroy
        working-directory: ${{ env.TERRAGRUNT_CONFIG_DIRECTORY }}

      - name: Terragrunt apply destroy
        run: terragrunt apply -input=false -auto-approve tgplan-destroy
        working-directory: ${{ env.TERRAGRUNT_CONFIG_DIRECTORY }}
