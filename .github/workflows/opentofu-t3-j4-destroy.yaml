---
name: OpenTofu T3 J4 Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm OpenTofu destroy"
        required: true
        type: string

permissions:
  contents: read

env:
  CONFIG_DIRECTORY: teraform-salle3-jour4
  AWS_REGION: eu-west-1
  TF_VAR_db_app_password: ${{ secrets.DB_APP_PASSWORD }}

jobs:
  opentofu-destroy:
    name: OpenTofu Salle 3 Jour 4 plan destroy and apply destroy
    runs-on: ubuntu-latest

    steps:
      - name: Validate destroy confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "You must type DESTROY to run this workflow."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: OpenTofu init
        run: tofu init -input=false
        working-directory: ${{ env.CONFIG_DIRECTORY }}

      - name: OpenTofu plan destroy
        run: tofu plan -destroy -input=false -out=tfplan
        working-directory: ${{ env.CONFIG_DIRECTORY }}

      - name: OpenTofu apply destroy
        run: tofu apply -input=false -auto-approve tfplan
        working-directory: ${{ env.CONFIG_DIRECTORY }}
